<!-- templates/products/phone_list.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
        }
        .phone-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .phone-item {
            background-color: white;
            padding: 20px;
            margin: 10px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .phone-item img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .phone-item h2 {
            font-size: 24px;
            color: #333;
        }
        .phone-item p {
            font-size: 16px;
            color: #666;
        }
        .phone-item .price {
            font-size: 18px;
            color: #008000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Phone List</h1>
    <div class="phone-container">
        {% for phone in phones %}
            <div class="phone-item">
                <h2>{{ phone.title }}</h2>
                <p>Brand: {{ phone.brand.name }}</p>
                <p>{{ phone.description }}</p>
                <p class="price">Price: ${{ phone.price }}</p>
                {% if phone.image %}
                    <img src="{{ phone.image.url }}" alt="{{ phone.title }}">
                {% endif %}
            </div>
        {% empty %}
            <p>No phones available.</p>
        {% endfor %}
    </div>
</body>
</html>
